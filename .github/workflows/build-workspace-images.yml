# Retry note: push-triggered rerun after transient GHCR timeout
name: Build Hermes Workspace Images (Manual)

on:
  push:
    branches: [main]
    paths:
      - "versions.json"
      - "docker/**"
      - "app/umbrel-app.yml"
      - ".github/workflows/build-workspace-images.yml"
  workflow_dispatch:
    inputs:
      workspace_ref:
        description: "Optional Hermes Workspace git ref override"
        required: false
        default: ""
      hermes_ref:
        description: "Optional Hermes Agent git ref override"
        required: false
        default: ""
      image_tag:
        description: "Optional registry tag override for both images"
        required: false
        default: ""
      push_image:
        description: "Push built images to GHCR"
        type: boolean
        required: true
        default: false

jobs:
  build-and-smoke:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    env:
      EFFECTIVE_PUSH_IMAGE: ${{ github.event_name == 'push' || inputs.push_image }}

    steps:
      - name: Checkout packaging repo
        uses: actions/checkout@v6

      - name: Read packaging build config
        id: config
        shell: bash
        env:
          INPUT_WORKSPACE_REF: ${{ github.event_name == 'workflow_dispatch' && inputs.workspace_ref || '' }}
          INPUT_HERMES_REF: ${{ github.event_name == 'workflow_dispatch' && inputs.hermes_ref || '' }}
          INPUT_IMAGE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.image_tag || '' }}
        run: |
          set -euo pipefail
          python3 - <<'PY2'
          import json
          import os
          from pathlib import Path

          config = json.loads(Path('versions.json').read_text())
          workspace = config['components']['workspace']
          hermes = config['components']['hermes_agent']
          workspace_ref = os.environ.get('INPUT_WORKSPACE_REF', '').strip() or workspace['ref']
          hermes_ref = os.environ.get('INPUT_HERMES_REF', '').strip() or hermes['ref']
          image_tag = os.environ.get('INPUT_IMAGE_TAG', '').strip() or config['image_tag']
          with open(os.environ['GITHUB_OUTPUT'], 'a', encoding='utf-8') as fh:
              fh.write(f"workspace_repo={workspace['repo']}\n")
              fh.write(f'workspace_ref={workspace_ref}\n')
              fh.write(f"hermes_repo={hermes['repo']}\n")
              fh.write(f'hermes_ref={hermes_ref}\n')
              fh.write(f'image_tag={image_tag}\n')
          PY2

      - name: Checkout upstream Hermes Workspace
        uses: actions/checkout@v6
        with:
          repository: ${{ steps.config.outputs.workspace_repo }}
          ref: ${{ steps.config.outputs.workspace_ref }}
          path: upstream-workspace

      - name: Checkout upstream Hermes Agent
        uses: actions/checkout@v6
        with:
          repository: ${{ steps.config.outputs.hermes_repo }}
          ref: ${{ steps.config.outputs.hermes_ref }}
          path: upstream-hermes

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        if: ${{ env.EFFECTIVE_PUSH_IMAGE == 'true' }}
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build workspace UI image
        id: ui_build
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./docker/workspace.Dockerfile
          platforms: linux/amd64,linux/arm64
          push: ${{ env.EFFECTIVE_PUSH_IMAGE == 'true' }}
          tags: |
            ghcr.io/harmalh/hermes-workspace-ui-umbrel:${{ steps.config.outputs.image_tag }}

      - name: Build Hermes API image
        id: api_build
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./docker/hermes-api.Dockerfile
          platforms: linux/amd64,linux/arm64
          push: ${{ env.EFFECTIVE_PUSH_IMAGE == 'true' }}
          tags: |
            ghcr.io/harmalh/hermes-workspace-api-umbrel:${{ steps.config.outputs.image_tag }}

      - name: Print digests
        if: ${{ env.EFFECTIVE_PUSH_IMAGE == 'true' }}
        run: |
          echo "UI digest:  ${{ steps.ui_build.outputs.digest }}"
          echo "API digest: ${{ steps.api_build.outputs.digest }}"

      - name: Local smoke tests (amd64 only)
        run: |
          set -euo pipefail

          docker buildx build \
            --platform linux/amd64 \
            --load \
            -f docker/hermes-api.Dockerfile \
            -t local/hermes-workspace-api:${{ github.run_id }} \
            .

          docker buildx build \
            --platform linux/amd64 \
            --load \
            -f docker/workspace.Dockerfile \
            -t local/hermes-workspace-ui:${{ github.run_id }} \
            .

          mkdir -p /tmp/hermes-workspace-home
          chmod 0777 /tmp/hermes-workspace-home

          api_cid="$(docker run -d \
            -e HOME=/opt/hermes-home \
            -v /tmp/hermes-workspace-home:/opt/hermes-home \
            -p 8642:8642 \
            local/hermes-workspace-api:${{ github.run_id }})"

          api_ok="false"
          for i in $(seq 1 90); do
            if bash -lc 'exec 3<>/dev/tcp/127.0.0.1/8642' 2>/dev/null; then
              api_ok="true"
              break
            fi
            sleep 2
          done

          docker logs "${api_cid}" --tail 250
          if [ "${api_ok}" != "true" ]; then
            docker rm -f "${api_cid}" || true
            echo "Hermes API did not start listening on port 8642" >&2
            exit 1
          fi

          ui_cid="$(docker run -d \
            --add-host=host.docker.internal:host-gateway \
            -e HERMES_API_URL=http://host.docker.internal:8642 \
            -p 3000:3000 \
            local/hermes-workspace-ui:${{ github.run_id }})"

          ui_ok="false"
          for i in $(seq 1 60); do
            if curl -fsS http://127.0.0.1:3000/ >/tmp/hermes-workspace-ui.html; then
              ui_ok="true"
              break
            fi
            sleep 2
          done

          docker logs "${ui_cid}" --tail 250
          docker rm -f "${ui_cid}" || true
          docker rm -f "${api_cid}" || true

          if [ "${ui_ok}" != "true" ]; then
            echo "Hermes Workspace UI did not become ready on port 3000" >&2
            exit 1
          fi
