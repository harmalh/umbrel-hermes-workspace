name: Release Hermes Workspace To Umbrel Community Store

on:
  push:
    branches:
      - main
    paths:
      - "versions.json"
      - "docker/**"
      - "app/**"
      - ".github/workflows/release-to-umbrel-community-store.yml"
  workflow_dispatch:
    inputs:
      release_version:
        description: "Optional release version override for the Umbrel app"
        required: false
        default: ""
      image_tag:
        description: "Optional GHCR image tag override"
        required: false
        default: ""

concurrency:
  group: release-hermes-workspace-store-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    env:
      COMMUNITY_STORE_REPO: harmalh/umbrel-community-store
      COMMUNITY_STORE_APP_DIR: harmalh-hermes-workspace
      UI_IMAGE_NAME: ghcr.io/harmalh/hermes-workspace-ui-umbrel
      API_IMAGE_NAME: ghcr.io/harmalh/hermes-workspace-api-umbrel

    steps:
      - name: Verify community store token is configured
        shell: bash
        env:
          COMMUNITY_STORE_PAT: ${{ secrets.COMMUNITY_STORE_PAT }}
        run: |
          set -euo pipefail
          if [ -z "${COMMUNITY_STORE_PAT}" ]; then
            echo "Missing required secret COMMUNITY_STORE_PAT" >&2
            echo "Create a fine-grained GitHub token with Contents: Read and write on harmalh/umbrel-community-store." >&2
            exit 1
          fi
          git ls-remote "https://harmalh:${COMMUNITY_STORE_PAT}@github.com/harmalh/umbrel-community-store.git" HEAD >/dev/null

      - name: Checkout packaging repo
        uses: actions/checkout@v6

      - name: Checkout community store repo
        uses: actions/checkout@v6
        with:
          repository: ${{ env.COMMUNITY_STORE_REPO }}
          ref: main
          path: community-store
          persist-credentials: false

      - name: Read packaging build config
        id: config
        shell: bash
        env:
          DEFAULT_IMAGE_TAG: ${{ steps.config.outputs.image_tag }}
        run: |
          set -euo pipefail
          python3 - <<'PY2'
          import json
          import os
          from pathlib import Path

          config = json.loads(Path('versions.json').read_text())
          workspace = config['components']['workspace']
          hermes_agent = config['components']['hermes_agent']
          with open(os.environ['GITHUB_OUTPUT'], 'a', encoding='utf-8') as fh:
              fh.write(f"workspace_repo={workspace['repo']}\n")
              fh.write(f"workspace_ref={workspace['ref']}\n")
              fh.write(f"workspace_track={workspace['track']}\n")
              fh.write(f"workspace_version={workspace.get('version', '')}\n")
              fh.write(f"hermes_agent_repo={hermes_agent['repo']}\n")
              fh.write(f"hermes_agent_ref={hermes_agent['ref']}\n")
              fh.write(f"hermes_agent_track={hermes_agent['track']}\n")
              fh.write(f"hermes_agent_version={hermes_agent.get('version', '')}\n")
              fh.write(f"image_tag={config['image_tag']}\n")
          PY2

      - name: Determine release version and image tag
        id: release
        shell: bash
        env:
          OVERRIDE_RELEASE_VERSION: ${{ github.event.inputs.release_version }}
          OVERRIDE_IMAGE_TAG: ${{ github.event.inputs.image_tag }}
        run: |
          set -euo pipefail
          python3 - <<'PY2'
          import os
          import re
          from pathlib import Path

          store_manifest = Path('community-store') / os.environ['COMMUNITY_STORE_APP_DIR'] / 'umbrel-app.yml'
          current_version = '0.1.0'
          if store_manifest.exists():
              text = store_manifest.read_text(encoding='utf-8')
              match = re.search(r'^version:\s*"([^"]+)"', text, flags=re.MULTILINE)
              if match:
                  current_version = match.group(1)

          override_release = os.environ.get('OVERRIDE_RELEASE_VERSION', '').strip()
          if override_release:
              next_version = override_release
          else:
              parts = current_version.split('.')
              if len(parts) != 3 or any(not p.isdigit() for p in parts):
                  raise SystemExit(f'Current Umbrel app version is not simple semver: {current_version}')
              major, minor, patch = map(int, parts)
              next_version = f'{major}.{minor}.{patch + 1}'

          override_image_tag = os.environ.get('OVERRIDE_IMAGE_TAG', '').strip()
          image_tag = override_image_tag or os.environ.get('DEFAULT_IMAGE_TAG', '') or next_version

          with open(os.environ['GITHUB_OUTPUT'], 'a', encoding='utf-8') as fh:
              fh.write(f'current_version={current_version}\n')
              fh.write(f'next_version={next_version}\n')
              fh.write(f'image_tag={image_tag}\n')
          PY2

      - name: Checkout upstream Hermes Workspace
        uses: actions/checkout@v6
        with:
          repository: ${{ steps.config.outputs.workspace_repo }}
          ref: ${{ steps.config.outputs.workspace_ref }}
          path: upstream-workspace

      - name: Checkout pinned upstream Hermes Agent commit
        uses: actions/checkout@v6
        with:
          repository: ${{ steps.config.outputs.hermes_agent_repo }}
          ref: ${{ steps.config.outputs.hermes_agent_ref }}
          path: upstream-hermes

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push workspace UI image (amd64)
        id: ui_build_amd64
        timeout-minutes: 60
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./docker/workspace.Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.UI_IMAGE_NAME }}:${{ steps.release.outputs.image_tag }}-amd64

      - name: Build and push workspace UI image (arm64)
        id: ui_build_arm64
        timeout-minutes: 60
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./docker/workspace.Dockerfile
          platforms: linux/arm64
          push: true
          tags: |
            ${{ env.UI_IMAGE_NAME }}:${{ steps.release.outputs.image_tag }}-arm64

      - name: Assemble workspace UI multi-arch image
        id: ui_manifest
        timeout-minutes: 15
        shell: bash
        env:
          IMAGE_TAG: ${{ steps.release.outputs.image_tag }}
          UI_AMD64_DIGEST: ${{ steps.ui_build_amd64.outputs.digest }}
          UI_ARM64_DIGEST: ${{ steps.ui_build_arm64.outputs.digest }}
        run: |
          set -euo pipefail
          ui_tag="${UI_IMAGE_NAME}:${IMAGE_TAG}"
          ui_amd64_ref="${UI_IMAGE_NAME}:${IMAGE_TAG}-amd64@${UI_AMD64_DIGEST}"
          ui_arm64_ref="${UI_IMAGE_NAME}:${IMAGE_TAG}-arm64@${UI_ARM64_DIGEST}"

          echo "Creating ${ui_tag} from:"
          echo "  - ${ui_amd64_ref}"
          echo "  - ${ui_arm64_ref}"

          docker buildx imagetools create             --tag "${ui_tag}"             "${ui_amd64_ref}"             "${ui_arm64_ref}"

          inspect_output="$(docker buildx imagetools inspect "${ui_tag}")"
          printf '%s\n' "${inspect_output}"

          ui_digest="$(INSPECT_OUTPUT="${inspect_output}" python3 - <<'PY2'
          import os
          import re

          text = os.environ['INSPECT_OUTPUT']
          match = re.search(r'^Digest:\s*(sha256:[0-9a-f]+)\s*$', text, flags=re.MULTILINE)
          if not match:
              raise SystemExit('Failed to parse manifest digest from docker buildx imagetools inspect output')
          print(match.group(1))
          PY2
          )"

          echo "digest=${ui_digest}" >> "$GITHUB_OUTPUT"
          {
            echo "### Workspace UI image"
            echo "- Image: ${ui_tag}@${ui_digest}"
            echo "- amd64: ${ui_amd64_ref}"
            echo "- arm64: ${ui_arm64_ref}"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Build and push Hermes API image
        id: api_build
        timeout-minutes: 60
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./docker/hermes-api.Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.API_IMAGE_NAME }}:${{ steps.release.outputs.image_tag }}

      - name: Prepare community store release files
        shell: bash
        env:
          RELEASE_VERSION: ${{ steps.release.outputs.next_version }}
          IMAGE_TAG: ${{ steps.release.outputs.image_tag }}
          UI_DIGEST: ${{ steps.ui_manifest.outputs.digest }}
          API_DIGEST: ${{ steps.api_build.outputs.digest }}
          WORKSPACE_REF: ${{ steps.config.outputs.workspace_ref }}
          WORKSPACE_VERSION: ${{ steps.config.outputs.workspace_version }}
          HERMES_AGENT_REF: ${{ steps.config.outputs.hermes_agent_ref }}
          HERMES_AGENT_VERSION: ${{ steps.config.outputs.hermes_agent_version }}
        run: |
          set -euo pipefail
          target_dir="community-store/${COMMUNITY_STORE_APP_DIR}"
          rm -rf "${target_dir}"
          mkdir -p "${target_dir}"
          cp -R app/. "${target_dir}/"

          python3 - <<'PY2'
          import os
          import re
          from pathlib import Path

          target_dir = Path('community-store') / os.environ['COMMUNITY_STORE_APP_DIR']
          compose_path = target_dir / 'docker-compose.yml'
          manifest_path = target_dir / 'umbrel-app.yml'

          release_version = os.environ['RELEASE_VERSION']
          image_tag = os.environ['IMAGE_TAG']
          ui_digest = os.environ['UI_DIGEST']
          api_digest = os.environ['API_DIGEST']
          workspace_ref = os.environ['WORKSPACE_REF']
          workspace_version = os.environ.get('WORKSPACE_VERSION', '').strip()
          hermes_agent_ref = os.environ['HERMES_AGENT_REF']
          hermes_agent_version = os.environ.get('HERMES_AGENT_VERSION', '').strip()

          def format_component(name, version, ref):
              if version:
                  return f'{name} {version}'
              if ref:
                  return f'{name} commit {ref[:7]}'
              return name

          workspace_label = format_component('Hermes Workspace', workspace_version, workspace_ref)
          hermes_label = format_component('Hermes Agent', hermes_agent_version, hermes_agent_ref)

          compose_text = compose_path.read_text(encoding='utf-8')
          compose_text = re.sub(r'(^\s*image:\s*)ghcr\.io/harmalh/hermes-workspace-ui-umbrel:[^\s@]+(?:@[^\s]+)?$', rf'\1ghcr.io/harmalh/hermes-workspace-ui-umbrel:{image_tag}@{ui_digest}', compose_text, flags=re.M)
          compose_text = re.sub(r'(^\s*image:\s*)ghcr\.io/harmalh/hermes-workspace-api-umbrel:[^\s@]+(?:@[^\s]+)?$', rf'\1ghcr.io/harmalh/hermes-workspace-api-umbrel:{image_tag}@{api_digest}', compose_text, flags=re.M)
          compose_path.write_text(compose_text, encoding='utf-8')

          manifest_text = manifest_path.read_text(encoding='utf-8')
          manifest_text = re.sub(r'^version:\s*"[^"]+"', f'version: "{release_version}"', manifest_text, flags=re.M)
          manifest_text = re.sub(r'^icon:\s*.*$', 'icon: https://raw.githubusercontent.com/harmalh/umbrel-community-store/main/harmalh-hermes-workspace/assets/icon.svg', manifest_text, flags=re.M)
          manifest_text = re.sub(r'^submission:\s*.*$', 'submission: https://github.com/harmalh/umbrel-community-store', manifest_text, flags=re.M)
          description = (
              'description: >-\n'
              '  Hermes Workspace is the full Hermes browser UI for chat, files, terminal,\n'
              '  memory, skills, and session continuity on Umbrel.\n\n'
              '  This package runs a production build of outsourc-e/hermes-workspace in front\n'
              '  of a Hermes API service built from outsourc-e/hermes-agent.\n\n'
              f'  Bundled upstreams: {workspace_label} and {hermes_label}.\n\n'
              '  The UI stays stateless while Hermes runtime data is persisted under\n'
              '  APP_DATA_DIR/hermes.\n\n'
              '  Build and publish both GHCR images before installing from the community store.\n'
          )
          manifest_text = re.sub(r'(?ms)^description:\s*>-\n.*?^developer:\s*.*$', description + 'developer: outsourc-e', manifest_text)
          release_notes = (
              'releaseNotes: >-\n'
              '  Automated private release from harmalh/umbrel-hermes-workspace.\n\n'
              f'  Workspace ref: {workspace_ref}\n'
              f'  Hermes Agent ref: {hermes_agent_ref}\n'
              f'  UI image: ghcr.io/harmalh/hermes-workspace-ui-umbrel:{image_tag}@{ui_digest}\n'
              f'  API image: ghcr.io/harmalh/hermes-workspace-api-umbrel:{image_tag}@{api_digest}\n'
          )
          manifest_text = re.sub(r'(?ms)^releaseNotes:\s*>-\n.*?^dependencies:\s*\[\]\s*$', release_notes + 'dependencies: []', manifest_text)
          manifest_path.write_text(manifest_text + '\n', encoding='utf-8')
          PY2

      - name: Commit and push community store release
        shell: bash
        env:
          COMMUNITY_STORE_PAT: ${{ secrets.COMMUNITY_STORE_PAT }}
        run: |
          set -euo pipefail
          cd community-store
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git remote set-url origin "https://harmalh:${COMMUNITY_STORE_PAT}@github.com/${COMMUNITY_STORE_REPO}.git"
          git add "${COMMUNITY_STORE_APP_DIR}"
          if git diff --cached --quiet; then
            echo "No community store changes to publish"
            exit 0
          fi
          git commit -m "Release Hermes Workspace ${{ steps.release.outputs.next_version }}"
          for attempt in 1 2 3; do
            git fetch origin main
            git rebase origin/main && git push origin HEAD:main && exit 0
            if [ "${attempt}" -eq 3 ]; then
              echo "Failed to push community store update after ${attempt} attempts" >&2
              exit 1
            fi
            git rebase --abort || true
            sleep $((attempt * 5))
          done
