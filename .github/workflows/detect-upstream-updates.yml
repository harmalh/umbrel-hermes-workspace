name: Detect Upstream Updates

on:
  schedule:
    - cron: "17 5 * * *"
  workflow_dispatch:

concurrency:
  group: detect-hermes-workspace-upstream-${{ github.ref }}
  cancel-in-progress: true

jobs:
  detect:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout packaging repo
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Read current metadata
        id: current
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY2'
          import json
          import os
          from pathlib import Path

          config = json.loads(Path('versions.json').read_text())
          workspace = config['components']['workspace']
          hermes = config['components']['hermes_agent']
          with open(os.environ['GITHUB_OUTPUT'], 'a', encoding='utf-8') as fh:
              fh.write(f"workspace_repo={workspace['repo']}\n")
              fh.write(f"workspace_track={workspace['track']}\n")
              fh.write(f"workspace_ref={workspace['ref']}\n")
              fh.write(f"hermes_repo={hermes['repo']}\n")
              fh.write(f"hermes_track={hermes['track']}\n")
              fh.write(f"hermes_ref={hermes['ref']}\n")
              fh.write(f"hermes_version={hermes.get('version', '')}\n")
              fh.write(f"image_tag={config['image_tag']}\n")
          PY2

      - name: Resolve latest upstream refs
        id: latest
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          WORKSPACE_REPO: ${{ steps.current.outputs.workspace_repo }}
          WORKSPACE_TRACK: ${{ steps.current.outputs.workspace_track }}
          HERMES_REPO: ${{ steps.current.outputs.hermes_repo }}
          HERMES_TRACK: ${{ steps.current.outputs.hermes_track }}
        run: |
          set -euo pipefail
          python3 - <<'PY2'
          import json
          import os
          import subprocess

          def gh_json(*args):
              out = subprocess.check_output(['gh', 'api', *args], text=True)
              return json.loads(out)

          workspace_repo = os.environ['WORKSPACE_REPO']
          hermes_repo = os.environ['HERMES_REPO']

          workspace = gh_json(f'repos/{workspace_repo}')
          workspace_branch = workspace['default_branch']
          workspace_commit = gh_json(f'repos/{workspace_repo}/commits/{workspace_branch}')['sha']

          latest_release = gh_json(f'repos/{hermes_repo}/releases/latest')
          hermes_tag = latest_release['tag_name']
          hermes_commit = gh_json(f'repos/{hermes_repo}/commits/{hermes_tag}')['sha']

          with open(os.environ['GITHUB_OUTPUT'], 'a', encoding='utf-8') as fh:
              fh.write(f'workspace_track=branch:{workspace_branch}\n')
              fh.write(f'workspace_ref={workspace_commit}\n')
              fh.write(f'hermes_track=latest-release\n')
              fh.write(f'hermes_version={hermes_tag}\n')
              fh.write(f'hermes_ref={hermes_commit}\n')
          PY2

      - name: Update metadata if upstream changed
        id: update
        shell: bash
        env:
          CURRENT_WORKSPACE_REF: ${{ steps.current.outputs.workspace_ref }}
          CURRENT_HERMES_REF: ${{ steps.current.outputs.hermes_ref }}
          CURRENT_HERMES_VERSION: ${{ steps.current.outputs.hermes_version }}
          LATEST_WORKSPACE_TRACK: ${{ steps.latest.outputs.workspace_track }}
          LATEST_WORKSPACE_REF: ${{ steps.latest.outputs.workspace_ref }}
          LATEST_HERMES_TRACK: ${{ steps.latest.outputs.hermes_track }}
          LATEST_HERMES_VERSION: ${{ steps.latest.outputs.hermes_version }}
          LATEST_HERMES_REF: ${{ steps.latest.outputs.hermes_ref }}
        run: |
          set -euo pipefail
          python3 - <<'PY2'
          import json
          import os
          from pathlib import Path

          changed = []
          path = Path('versions.json')
          data = json.loads(path.read_text())

          if os.environ['CURRENT_WORKSPACE_REF'] != os.environ['LATEST_WORKSPACE_REF']:
              data['components']['workspace']['track'] = os.environ['LATEST_WORKSPACE_TRACK']
              data['components']['workspace']['ref'] = os.environ['LATEST_WORKSPACE_REF']
              changed.append('workspace')

          if os.environ['CURRENT_HERMES_REF'] != os.environ['LATEST_HERMES_REF']:
              data['components']['hermes_agent']['track'] = os.environ['LATEST_HERMES_TRACK']
              data['components']['hermes_agent']['version'] = os.environ['LATEST_HERMES_VERSION']
              data['components']['hermes_agent']['ref'] = os.environ['LATEST_HERMES_REF']
              changed.append('hermes-agent')

          if not changed:
              with open(os.environ['GITHUB_OUTPUT'], 'a', encoding='utf-8') as fh:
                  fh.write('changed=false\n')
              raise SystemExit(0)

          path.write_text(json.dumps(data, indent=2) + '\n')
          with open(os.environ['GITHUB_OUTPUT'], 'a', encoding='utf-8') as fh:
              fh.write('changed=true\n')
              fh.write(f'components={\" ,\".join(changed).replace(\" ,\", ",\")}\n')
          PY2

      - name: Bump packaging image tag
        if: steps.update.outputs.changed == 'true'
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY2'
          import json
          from pathlib import Path

          path = Path('versions.json')
          data = json.loads(path.read_text())
          parts = data['image_tag'].split('.')
          if len(parts) == 3 and all(p.isdigit() for p in parts):
              parts[-1] = str(int(parts[-1]) + 1)
              data['image_tag'] = '.'.join(parts)
          path.write_text(json.dumps(data, indent=2) + '\n')
          PY2

      - name: Commit and push detector update
        if: steps.update.outputs.changed == 'true'
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git add versions.json
          git commit -m "chore: refresh upstream pins for ${{ steps.update.outputs.components }}"
          for attempt in 1 2 3; do
            git fetch origin main
            git rebase origin/main && git push origin HEAD:main && exit 0
            if [ "${attempt}" -eq 3 ]; then
              echo "Failed to push detector update after ${attempt} attempts" >&2
              exit 1
            fi
            git rebase --abort || true
            sleep $((attempt * 5))
          done

      - name: Summarize no-op result
        if: steps.update.outputs.changed != 'true'
        run: echo "No upstream component updates detected." >> "$GITHUB_STEP_SUMMARY"
